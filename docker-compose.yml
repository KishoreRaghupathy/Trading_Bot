version: "3.9"

services:
  trading-bot:
    build: .
    container_name: trading_analysis_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data          # persistent SQLite DB
      - ./src:/app/src            # hot-reload friendly in dev
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
